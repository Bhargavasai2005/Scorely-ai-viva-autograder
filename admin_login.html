    <div class="viva-admin-login-main">
      <main class="viva-admin-login">
        <div class="viva-admin-login-card">
          <header class="viva-admin-login-brand">
            <div class="viva-admin-login-badge" aria-hidden="true">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="10" stroke="currentColor" stroke-width="2.5" />
                <path
                  d="M24 4v4M24 40v4M44 24h-4M8 24H4M38.6 9.4l-2.8 2.8M12.2 35.8l-2.8 2.8M38.6 38.6l-2.8-2.8M12.2 12.2l-2.8-2.8"

                  stroke-width="2.5"
                  stroke-linecap="round"
                />
              </svg>
            </div>
            <p class="viva-admin-login-eyebrow">Viva Adaptive</p>
            <h1>Admin Portal</h1>
            <p class="viva-admin-login-sub">Sign in to sessions, questions, and analytics</p>
          </header>
          <form class="viva-admin-login-form" id="admin-login-form" action="#" method="post" novalidate>
            <label class="viva-admin-login-field">
              <span class="viva-admin-login-field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </span>
              <input
                type="text"
                name="username"
                id="admin-username"
                autocomplete="username"
                placeholder="Username"
                aria-label="Username"
                required
              />
            </label>
            <label class="viva-admin-login-field">
              <span class="viva-admin-login-field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input
                type="password"
                name="password"
                id="admin-password"
                autocomplete="current-password"
                placeholder="Password"
                aria-label="Password"
                required
              />
            </label>
            <p id="admin-login-error" class="viva-admin-login-error" hidden role="alert"></p>
            <button type="submit" class="viva-admin-login-submit">
              <span>Sign in</span>
              <span class="viva-admin-login-submit-glow" aria-hidden="true"></span>
            </button>
          </form>
        </div>
      </main>
    </div>
